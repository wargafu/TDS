name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Checks — @tds-tchad/core
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: packages/core

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install devDependencies (TypeScript)
        run: npm install --ignore-scripts
        working-directory: packages/core

      # ── Type safety ────────────────────────────────────────────
      - name: Typecheck
        run: ./node_modules/.bin/tsc -p tsconfig.typecheck.json

      # ── Token validation (sans build) ──────────────────────────
      - name: Validate tokens
        run: node scripts/validate-tokens.mjs

      # ── Build (tsc + copy assets) ──────────────────────────────
      - name: Build
        run: node scripts/build.mjs

      # ── Export validation (post-build) ─────────────────────────
      - name: Validate exports
        run: node scripts/validate-exports.mjs

      # ── Tests (token consistency, CSS parse validity) ──────────
      - name: Test
        run: npx vitest run

      # ── CSS quality (duplicate props, tds- naming convention) ──
      - name: Lint CSS
        run: npx stylelint "src/**/*.css"

  docs:
    name: Build docs
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/docs/package-lock.json

      # ── @tds-tchad/core doit être buildé avant les docs : la page
      #    playground.astro sert le CSS réel via public/tds/ (copié depuis
      #    packages/core/dist par le script prebuild de apps/docs).
      - name: Install core devDependencies
        run: npm install --ignore-scripts
        working-directory: packages/core

      - name: Build core
        run: node scripts/build.mjs
        working-directory: packages/core

      - name: Install docs dependencies
        run: npm install
        working-directory: apps/docs

      - name: Build docs
        run: npm run build
        working-directory: apps/docs

      # ── Accessibilité automatisée (axe-core + Puppeteer) ───────
      - name: Test accessibility
        run: npm run test:a11y
        working-directory: apps/docs

  publish:
    name: Publish (release only)
    needs: quality
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    defaults:
      run:
        working-directory: packages/core

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install devDependencies (TypeScript)
        run: npm install --ignore-scripts

      - name: Build
        run: node scripts/build.mjs

      - name: Publish @tds-tchad/core
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
